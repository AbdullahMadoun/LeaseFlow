            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background-color: #f9f9f7;

<body class="min-h-screen flex items-center justify-center p-6 font-body text-on-surface">
<div class="max-w-xl w-full">
<!-- Terminal Window Frame -->
<div class="bg-secondary border-[3px] border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] overflow-hidden">
<!-- Terminal Header -->
<div class="flex items-center justify-between px-4 py-2 bg-secondary border-b-[3px] border-black">
<div class="flex gap-2">
<div class="w-3 h-3 border-[2px] border-black bg-on-secondary"></div>
<div class="w-3 h-3 border-[2px] border-black bg-on-secondary"></div>
<div class="w-3 h-3 border-[2px] border-black bg-on-secondary"></div>
</div>
<div class="font-mono text-xs font-bold text-on-secondary tracking-widest uppercase">
                    ~/signup.sh
                </div>
<div class="w-12"></div> <!-- Spacer for symmetry -->
</div>
<!-- Main Content Area -->
<div class="bg-surface p-8 md:p-12">
<!-- Section Label -->
<div class="mb-10 flex items-center gap-4">
<span class="font-mono text-sm font-bold text-primary-container bg-black px-2 py-1">GET STARTED ----</span>
</div>
<h1 class="font-headline font-black text-4xl mb-8 tracking-tighter uppercase leading-none">
                    Initialize <br/>Account Session
                </h1>
<!-- Form Fields -->
<form action="#" class="space-y-8" method="POST">
<!-- Business Name -->
<div class="relative">
<label class="absolute -top-3 left-4 bg-surface px-2 font-mono text-[10px] font-bold text-on-surface uppercase tracking-tighter z-10">
                            Business Name
                        </label>
<input class="w-full bg-surface-container-low border-[3px] border-black p-4 font-mono focus:ring-0 focus:outline-none focus:bg-surface-container-high transition-colors placeholder:text-outline-variant" placeholder="ARCHITECTURAL LEDGER INC." type="text"/>
</div>
<!-- Email Address -->
<div class="relative">
<label class="absolute -top-3 left-4 bg-surface px-2 font-mono text-[10px] font-bold text-on-surface uppercase tracking-tighter z-10">
                            Email
                        </label>
<input class="w-full bg-surface-container-low border-[3px] border-black p-4 font-mono focus:ring-0 focus:outline-none focus:bg-surface-container-high transition-colors placeholder:text-outline-variant" placeholder="OPERATOR@SYSTEM.IO" type="email"/>
</div>
<!-- Password -->
<div class="relative">
<label class="absolute -top-3 left-4 bg-surface px-2 font-mono text-[10px] font-bold text-on-surface uppercase tracking-tighter z-10">
                            Password
                        </label>
<input class="w-full bg-surface-container-low border-[3px] border-black p-4 font-mono focus:ring-0 focus:outline-none focus:bg-surface-container-high transition-colors placeholder:text-outline-variant" placeholder="••••••••••••" type="password"/>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full bg-primary-container text-black border-[3px] border-black py-5 font-headline font-black text-lg uppercase tracking-tighter shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:-translate-x-0.5 hover:-translate-y-0.5 active:translate-x-1 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center gap-2 group" type="submit">
                            Create account
                            <span class="material-symbols-outlined font-black group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center pt-2">
<a class="font-mono text-xs font-bold uppercase tracking-widest text-on-surface hover:text-secondary transition-colors underline decoration-[3px] underline-offset-4" href="#">
                            Already have one? Log in
                        </a>
</div>
</form>
</div>
</div>
<!-- Asymmetric Decorative Element -->
<div class="mt-8 flex justify-end">
<div class="bg-black text-primary-container font-mono text-[10px] p-4 border-[3px] border-black max-w-[240px] shadow-[4px_4px_0px_0px_#fdc800]">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-sm" data-icon="security" style="font-variation-settings: 'FILL' 1;">security</span>
<span class="uppercase">Security Protocol v4.2</span>
</div>
<p class="leading-tight">All transmissions encrypted. High-stakes infrastructure verified. Proceed with precision.</p>
</div>
</div>
</div>
