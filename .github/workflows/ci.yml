name: pos-analyst CI

on:
  push:
    branches: [main, "feat/**"]
    paths:
      - "pos-analyst/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "pos-analyst/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: pos-analyst

jobs:
  lint-and-import-smoke:
    name: parse + import smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pos-analyst/scripts/requirements.txt

      - name: Install api deps
        run: pip install -r scripts/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.7.4

      - name: AST-parse every script
        run: |
          python - <<'PY'
          import ast, pathlib, sys
          bad = 0
          for p in sorted(pathlib.Path("scripts").glob("*.py")):
              try:
                  ast.parse(p.read_text(), filename=str(p))
              except SyntaxError as e:
                  print(f"FAIL {p}: {e}")
                  bad += 1
          sys.exit(1 if bad else 0)
          PY

      - name: Ruff lint (non-blocking style checks)
        run: ruff check scripts --output-format=github || true

      - name: Import smoke
        working-directory: pos-analyst/scripts
        run: |
          python - <<'PY'
          import config, models, prompts
          from models import JobState, Plan, PlanQuestion, Finding, ValidationResult, Contradiction
          from prompts import SYSTEM_PROMPT, TOOLS
          assert config.CONFIG.model_id == "MiniMax-M2.7", config.CONFIG.model_id
          assert len(TOOLS) == 5
          names = sorted(t["function"]["name"] for t in TOOLS)
          assert names == ["finish_analysis", "record_finding", "run_python", "update_plan", "web_search"], names
          # Pydantic round-trip
          JobState(job_id="j1", model_id="MiniMax-M2.7").model_dump_json()
          p = Plan(questions=[PlanQuestion(id="q1", text="x", priority="critical")])
          assert len(p.critical_pending()) == 1
          # dict-coercion path used by validate phase
          v = ValidationResult.model_validate({
              "contradictions": [{"finding_a":"f1","finding_b":"f2","explanation":"x"}],
              "hallucinations": ["f3"], "gaps": [], "recommend_more_investigation": [],
          })
          assert isinstance(v.contradictions[0], Contradiction)
          print("import smoke OK")
          PY

      - name: Data profiler smoke
        working-directory: pos-analyst/scripts
        run: |
          python - <<'PY'
          import pandas as pd, tempfile, pathlib
          from data_profiler import profile_job, render_profile_for_prompt
          df = pd.DataFrame({
              "transaction_id":[1,2,3,4,5],
              "created_at":["2026-01-01 08:15","2026-01-01 08:20","2026-01-01 09:00","2026-01-02 12:00","2026-01-02 12:30"],
              "branch":["A","A","B","A","B"],
              "item":["Latte","Croissant","Latte","Cappuccino","Espresso"],
              "qty":[1,1,-1,2,1],
              "unit_price":[4.5,3.0,4.5,5.0,3.5],
              "payment_method":["card","card","cash","card","cash"],
          })
          tmp = pathlib.Path(tempfile.mkdtemp()) / "pos.csv"
          df.to_csv(tmp, index=False)
          prof = profile_job("j_ci", [tmp])
          fp = prof.files[0]
          assert fp.detected_role["branch"] == "branch"
          assert fp.detected_role["timestamp"] == "created_at"
          flags = " ".join(fp.quality_flags)
          assert "negative qty" in flags, flags
          assert "2026-01-01" in render_profile_for_prompt(prof)
          print("profiler smoke OK")
          PY

  docker-build:
    name: docker build (api + sandbox)
    runs-on: ubuntu-latest
    needs: lint-and-import-smoke
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build sandbox image
        uses: docker/build-push-action@v6
        with:
          context: pos-analyst/scripts
          file: pos-analyst/scripts/Dockerfile.sandbox
          tags: pos-analyst-sandbox:ci
          push: false
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,scope=sandbox,mode=max

      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: pos-analyst/scripts
          file: pos-analyst/scripts/Dockerfile
          tags: pos-analyst-api:ci
          push: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Compose config lint
        run: docker compose -f pos-analyst/scripts/docker-compose.yml config >/dev/null
        env:
          MINIMAX_API_KEY: "ci-placeholder"
